<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - World Cup LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        WC LMS Admin
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h1><i class="fas fa-cog"></i> Admin Panel</h1>
    
    <div class="admin-card">
      <h2>Round Management</h2>
      <div id="round-status">Loading...</div>
      <button class="btn btn-primary" onclick="openRound()">Open Round</button>
      <button class="btn btn-secondary" onclick="closeRound()">Close Round</button>
    </div>

    <div class="admin-card">
      <h2>Match Results</h2>
      <div id="match-list">Loading...</div>
    </div>

    <div class="admin-card">
      <h2>All Picks</h2>
      <div id="all-picks">Loading...</div>
    </div>

    <!-- Data Import -->
    <div class="admin-card" style="border: 2px solid var(--accent-gold);">
      <h2><i class="fas fa-database"></i> Data Import</h2>
      <p>Import World Cup 2026 teams and rounds from openfootball (free open data)</p>
      <button class="btn btn-primary" onclick="importWorldCupData()">
        <i class="fas fa-download"></i> Import World Cup 2026 Data
      </button>
      <div id="import-status" style="margin-top: 1rem;"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
