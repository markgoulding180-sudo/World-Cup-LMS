<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - GB World Cup Tournament</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        GB World Cup
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-card">
      <h1><i class="fas fa-user-plus"></i> Register</h1>
      <form id="register-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="display-name" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" required>
        </div>
        
        <!-- Admin Registration -->
        <div class="form-group admin-toggle">
          <label class="checkbox-label">
            <input type="checkbox" id="is-admin" onchange="toggleAdminPin()">
            <span>Register as Admin</span>
          </label>
        </div>
        <div class="form-group admin-pin" id="admin-pin-group" style="display: none;">
          <label>Admin PIN</label>
          <input type="password" id="admin-pin" class="form-input" placeholder="Enter admin PIN">
          <small class="form-hint">Contact site owner for admin PIN</small>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      <p class="text-center mt-3">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <script>
    function toggleAdminPin() {
      const isAdmin = document.getElementById('is-admin').checked;
      const pinGroup = document.getElementById('admin-pin-group');
      pinGroup.style.display = isAdmin ? 'block' : 'none';
      if (isAdmin) {
        document.getElementById('admin-pin').focus();
      }
    }
    
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const displayName = document.getElementById('display-name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const isAdmin = document.getElementById('is-admin').checked;
      const adminPin = document.getElementById('admin-pin').value;
      
      try {
        const response = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'register',
            username,
            display_name: displayName,
            email,
            password,
            is_admin: isAdmin,
            admin_pin: adminPin
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert(data.message);
          window.location.href = 'login.html';
        } else {
          alert(data.error || 'Registration failed');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
