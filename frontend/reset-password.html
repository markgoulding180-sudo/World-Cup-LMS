<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - GB World Cup Tournament</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        GB World Cup
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-card">

      <div id="loading-msg" style="text-align:center;padding:1rem 0;">
        <i class="fas fa-spinner fa-spin"></i> Verifying reset link...
      </div>

      <div id="reset-form-wrapper" style="display:none;">
        <h1><i class="fas fa-key"></i> Set New Password</h1>
        <form id="reset-form">
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="new-password" class="form-input" required minlength="6">
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirm-password" class="form-input" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
      </div>

      <div id="success-msg" style="display:none;text-align:center;padding:2rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <h2 style="color:var(--accent-green);margin-bottom:0.5rem;">Password Updated!</h2>
        <p style="color:var(--text-secondary);margin-bottom:1rem;">
          You can now log in with your new password.
        </p>
        <a href="login.html" class="btn btn-primary">Go to Login</a>
      </div>

      <div id="error-msg" style="display:none;text-align:center;padding:2rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
        <h2 style="color:var(--accent-red);margin-bottom:0.5rem;">Link Invalid or Expired</h2>
        <p style="color:var(--text-secondary);margin-bottom:1rem;">
          This password reset link is no longer valid. Please request a new one or contact the admin.
        </p>
        <a href="login.html" class="btn btn-primary">Back to Login</a>
      </div>

    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jqctbpuulyhghrxjmqee.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_vz_kucACOudTn42svAhgg_ZjR9C1KJ1q5A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loadingMsg = document.getElementById('loading-msg');
    const formWrapper = document.getElementById('reset-form-wrapper');
    const successMsg = document.getElementById('success-msg');
    const errorMsg = document.getElementById('error-msg');

    // Supabase sends the recovery token in the URL hash (#access_token=...&type=recovery)
    // onAuthStateChange fires with PASSWORD_RECOVERY when the page loads with a valid token
    let sessionReady = false;

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        sessionReady = true;
        loadingMsg.style.display = 'none';
        formWrapper.style.display = 'block';
      }
    });

    // Fallback: if no PASSWORD_RECOVERY event fires within a few seconds,
    // check if there's an active session anyway (some flows set session directly)
    setTimeout(async () => {
      if (sessionReady) return;
      const { data } = await supabaseClient.auth.getSession();
      if (data?.session) {
        sessionReady = true;
        loadingMsg.style.display = 'none';
        formWrapper.style.display = 'block';
      } else {
        loadingMsg.style.display = 'none';
        errorMsg.style.display = 'block';
      }
    }, 3000);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }
      if (newPassword.length < 6) {
        alert('Password must be at least 6 characters.');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

        if (error) {
          alert('Error: ' + error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
          return;
        }

        // Sign out so they log in fresh with new password
        await supabaseClient.auth.signOut();

        formWrapper.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        alert('Error: ' + err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
