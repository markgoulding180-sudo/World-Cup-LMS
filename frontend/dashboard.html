<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - World Cup LMS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        WC LMS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="rules.html">Rules</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>
    
    <div class="status-card" id="status-card">
      <div id="player-status">Loading...</div>
    </div>

    <div class="pick-section" id="current-pick-section">
      <div class="section-tabs">
        <button class="tab-btn active" onclick="switchTab('picks')" id="tab-picks">Your Picks</button>
        <button class="tab-btn" onclick="switchTab('matches')" id="tab-matches">Matches</button>
      </div>
      <div id="tab-content-picks" class="tab-content active">
        <div id="current-pick">Loading...</div>
      </div>
      <div id="tab-content-matches" class="tab-content" style="display: none;">
        <div id="round-matches">Loading matches...</div>
      </div>
    </div>

    <!-- TOURNAMENT HISTORY -->
    <div class="pick-section" id="history-section">
      <h2><i class="fas fa-history"></i> Your Tournament History</h2>
      <div id="tournament-history">Loading history...</div>
    </div>

    <div class="pick-section" id="pick-section">
      <h2>Make Your Pick</h2>
      <div id="available-teams">Loading teams...</div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
