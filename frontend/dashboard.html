<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - World Cup LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        WC LMS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="rules.html">Rules</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>
    
    <div class="status-card" id="status-card">
      <h2>Your Status</h2>
      <div id="player-status">Loading...</div>
    </div>

    <div class="pick-section" id="current-pick-section">
      <h2>Your Pick</h2>
      <div id="current-pick">Loading...</div>
    </div>

    <div class="pick-section" id="pick-section">
      <h2>Make Your Pick</h2>
      <div id="available-teams">Loading teams...</div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
