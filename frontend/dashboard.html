<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GB World Cup Tournament</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i> GB World Cup
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="rules.html">Rules</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h1>Dashboard</h1>

    <!-- STATS CARD -->
    <div class="status-card" id="status-card">
      <div id="player-status">Loading...</div>
    </div>

    <!-- SINGLE UNIFIED TAB BOX -->
    <div class="pick-section" id="current-pick-section" style="max-width:1400px;">
      <div class="section-tabs">
        <button class="tab-btn active" onclick="switchTab('pick')"    id="tab-pick">⚽ Pick</button>
        <button class="tab-btn"        onclick="switchTab('history')" id="tab-history">📋 My History</button>
        <button class="tab-btn"        onclick="switchTab('leaderboard')" id="tab-leaderboard">🏆 Leaderboard</button>
        <button class="tab-btn"        onclick="switchTab('eligible')" id="tab-eligible">🚩 Eligible Teams</button>
        <button class="tab-btn"        onclick="switchTab('matches')"  id="tab-matches">📅 Matches</button>
        <button class="tab-btn"        onclick="switchTab('groups')"   id="tab-groups">📊 Group Results</button>
        <button class="tab-btn"        onclick="switchTab('knockout')" id="tab-knockout">⚔️ Knockout Grid</button>
      </div>

      <!-- TAB 1: PICK -->
      <div id="tab-content-pick" class="tab-content active">
        <div id="available-teams">Loading...</div>
      </div>

      <!-- TAB 2: MY HISTORY -->
      <div id="tab-content-history" class="tab-content" style="display:none;">
        <div id="tournament-history">Loading history...</div>
      </div>

      <!-- TAB 3: LEADERBOARD -->
      <div id="tab-content-leaderboard" class="tab-content" style="display:none;">
        <div id="dashboard-leaderboard">Loading leaderboard...</div>
      </div>

      <!-- TAB 4: ELIGIBLE TEAMS -->
      <div id="tab-content-eligible" class="tab-content" style="display:none;">
        <div id="eligible-teams-tab">Loading eligible teams...</div>
      </div>

      <!-- TAB 5: MATCHES -->
      <div id="tab-content-matches" class="tab-content" style="display:none;">
        <div id="round-matches">Loading matches...</div>
      </div>

      <!-- TAB 6: GROUP RESULTS -->
      <div id="tab-content-groups" class="tab-content" style="display:none;">
        <div id="group-results">Loading group standings...</div>
      </div>

      <!-- TAB 7: KNOCKOUT GRID -->
      <div id="tab-content-knockout" class="tab-content" style="display:none;">
        <div id="knockout-grid">Loading knockout grid...</div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
