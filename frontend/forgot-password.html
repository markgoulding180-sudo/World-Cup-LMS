<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - GB World Cup Tournament</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-trophy"></i>
        GB World Cup
      </a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-card">

      <div id="form-wrapper">
        <h1><i class="fas fa-unlock-alt"></i> Forgot Password</h1>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">
          Enter your email and we'll send you a link to reset your password.
        </p>
        <form id="forgot-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="form-input" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>
        <p class="text-center mt-3">
          <a href="login.html">Back to Login</a>
        </p>
      </div>

      <div id="success-msg" style="display:none;text-align:center;padding:2rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">📧</div>
        <h2 style="color:var(--accent-green);margin-bottom:0.5rem;">Check Your Email</h2>
        <p style="color:var(--text-secondary);margin-bottom:1rem;">
          If an account exists with that email, a password reset link has been sent. Check your inbox (and spam folder).
        </p>
        <a href="login.html" class="btn btn-primary">Back to Login</a>
      </div>

    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jqctbpuulyhghrxjmqee.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_vz_kucACOudTn42svAhgg_ZjR9C1KJ1q5A';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const redirectUrl = window.location.origin + '/reset-password.html';
        await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: redirectUrl
        });

        // Always show success message regardless of whether email exists
        // (prevents leaking which emails are registered)
        document.getElementById('form-wrapper').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } catch (err) {
        // Even on error, show success message for security (don't leak info)
        document.getElementById('form-wrapper').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
